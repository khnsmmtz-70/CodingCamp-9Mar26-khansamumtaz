<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">🌙</button>
    
    <div class="container">
        <!-- Greeting Section -->
        <section class="greeting">
            <h1 id="greeting-text">Good Morning</h1>
            <p id="datetime"></p>
            <input type="text" id="name-input" placeholder="Enter your name...">
        </section>

        <!-- Focus Timer Section -->
        <section class="timer">
            <h2>Focus Timer</h2>
            <div class="timer-display" id="timer-display">25:00</div>
            <div class="timer-controls">
                <button id="start-btn">Start</button>
                <button id="stop-btn">Stop</button>
                <button id="reset-btn">Reset</button>
            </div>
            <div class="timer-settings">
                <label for="timer-minutes">Duration (minutes):</label>
                <input type="number" id="timer-minutes" min="1" max="60" value="25">
                <button id="set-timer-btn">Set</button>
            </div>
        </section>

        <!-- To-Do List Section -->
        <section class="todo">
            <h2>To-Do List</h2>
            <div class="todo-input">
                <input type="text" id="todo-input" placeholder="Add a new task...">
                <button id="add-todo-btn">Add</button>
            </div>
            <ul id="todo-list"></ul>
        </section>

        <!-- Quick Links Section -->
        <section class="links">
            <h2>Quick Links</h2>
            <div class="links-input">
                <input type="text" id="link-name" placeholder="Link name">
                <input type="url" id="link-url" placeholder="https://example.com">
                <button id="add-link-btn">Add</button>
            </div>
            <div id="links-container"></div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
